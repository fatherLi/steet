<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>河长巡河轨迹实时演示</title>
    <style>
        html, body, #container {
            width: 100%;
            height: 100%;
            margin: 0px;
            padding: 0;
        }
        #panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            z-index: 999;
        }
        button {
            padding: 8px 15px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
<div id="container"></div>
<div id="panel">
    <h3>巡河实时轨迹</h3>
    <p>河长ID: <span id="userIdSpan">1001</span></p>
    <p>状态: <span id="wsStatus" style="color: red;">未连接</span></p>
    <button onclick="startSimulate()">模拟硬件上报GPS</button>
</div>

<!-- 引入高德地图JS API，请将下面的 key 替换为您申请的高德地图 Web端(JS API) Key，并配置安全密钥 -->
<script type="text/javascript">
    window._AMapSecurityConfig = {
        securityJsCode: 'YOUR_SECURITY_CODE', // TODO: 替换为您的安全密钥
    }
</script>
<script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY"></script> <!-- TODO: 替换为您的高德地图Key -->
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
    const userId = 1001; // 演示用的河长ID
    let map, polyline, marker;
    let path = []; // 存储坐标路线
    let ws;

    // 1. 初始化地图
    function initMap() {
        map = new AMap.Map('container', {
            zoom: 15,
            center: [116.397428, 39.90923] // 默认中心点(天安门)
        });

        // 初始化折线对象
        polyline = new AMap.Polyline({
            path: path,
            isOutline: true,
            outlineColor: '#ffeeff',
            borderWeight: 2,
            strokeColor: "#3366FF",
            strokeOpacity: 0.8,
            strokeWeight: 6,
            strokeStyle: "solid",
            lineJoin: 'round',
            lineCap: 'round',
            zIndex: 50
        });
        polyline.setMap(map);

        // 初始化Marker（河长当前位置）
        marker = new AMap.Marker({
            position: [116.397428, 39.90923],
            icon: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
            offset: new AMap.Pixel(-9, -31)
        });
        marker.setMap(map);

        // 获取今日已有轨迹
        fetchTodayTrajectory();
    }

    // 2. 从后端获取今天已经走过的轨迹，用于刷新页面时的还原
    async function fetchTodayTrajectory() {
        try {
            const res = await axios.get(`/api/v1/patrol/trajectory/today?userId=${userId}`);
            if (res.data.code === 200 && res.data.data.length > 0) {
                const trajectoryList = res.data.data;
                // 将后端数据按时间戳升序排序 (Redis zset 拿出来通常已经是有序的)
                trajectoryList.sort((a, b) => new Date(a.collectTime) - new Date(b.collectTime));
                
                path = trajectoryList.map(item => [item.longitude, item.latitude]);
                
                // 更新折线
                polyline.setPath(path);
                
                // 更新 marker 到最后一个点
                const lastPoint = path[path.length - 1];
                marker.setPosition(lastPoint);
                
                // 调整视野
                map.setFitView([polyline]);
            }
            // 获取完历史数据后，连接WebSocket接收实时数据
            connectWebSocket();
        } catch (error) {
            console.error('获取历史轨迹失败', error);
            connectWebSocket();
        }
    }

    // 3. 连接 WebSocket，接收实时坐标推送
    function connectWebSocket() {
        const wsUrl = `ws://${window.location.host}/ws/patrol/${userId}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            document.getElementById('wsStatus').innerText = '已连接 (接收实时数据中...)';
            document.getElementById('wsStatus').style.color = 'green';
        };

        ws.onmessage = (event) => {
            const newPointData = JSON.parse(event.data);
            const newLngLat = [newPointData.longitude, newPointData.latitude];
            
            console.log('接收到实时坐标:', newLngLat);
            
            // 将新坐标加入轨迹数组
            path.push(newLngLat);
            
            // 实时重绘折线
            polyline.setPath(path);
            
            // 实时移动河长Marker位置
            marker.setPosition(newLngLat);
            
            // 可选：让地图中心始终跟随河长
            map.setCenter(newLngLat);
        };

        ws.onclose = () => {
            document.getElementById('wsStatus').innerText = '已断开';
            document.getElementById('wsStatus').style.color = 'red';
            // 可以加入断线重连逻辑
            setTimeout(connectWebSocket, 5000);
        };
    }

    // --- 以下为模拟硬件发送数据的辅助代码 ---
    
    // 模拟GPS路线数据 (WGS84)
    const mockRoute = [
        [116.397428, 39.90923],
        [116.398000, 39.90923],
        [116.399000, 39.90923],
        [116.399000, 39.90800],
        [116.399000, 39.90700],
        [116.398000, 39.90700]
    ];
    let mockIndex = 0;

    function startSimulate() {
        if (mockIndex >= mockRoute.length) {
            alert('模拟轨迹发送完毕');
            mockIndex = 0;
            return;
        }
        const point = mockRoute[mockIndex];
        mockIndex++;

        // 模拟硬件通过 HTTP 上传到服务器
        axios.post('/api/v1/patrol/hardware/location', {
            userId: userId,
            longitude: point[0],
            latitude: point[1],
            speed: 1.5,
            timestamp: new Date().getTime()
        }).then(res => {
            console.log('模拟上报成功', res.data);
        }).catch(err => {
            console.error('模拟上报失败', err);
        });

        // 间隔2秒发送下一个点
        setTimeout(startSimulate, 2000);
    }

    // 初始化调用
    window.onload = function() {
        initMap();
    };
</script>
</body>
</html>
