server:
  port: 8081

spring:
  application:
    name: street-iot-adapter
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848

# ====================================================
# 海康威视开放平台对接配置 (支持 Nacos 动态下发)
# ====================================================
hikvision:
  host: "https://10.10.10.10:443"
  app-key: "YOUR_HIK_APP_KEY"
  app-secret: "YOUR_HIK_APP_SECRET"
  event-topic: "event_gps"
  
  # 硬件设备编码与河长ID的映射关系
  device-mapping:
    HK-DEVICE-001: 1001
    HK-DEVICE-002: 1002
    MAC-AABBCCDDEE: 1003

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

# ====================================================
# XXL-JOB Executor 配置 (企业级集群版)
# ====================================================
xxl:
  job:
    admin:
      # 支持配置多个调度中心地址，逗号分隔，实现 Admin 节点的高可用容灾
      addresses: http://127.0.0.1:8080/xxl-job-admin,http://127.0.0.2:8080/xxl-job-admin
    executor:
      appname: street-iot-adapter-executor
      # 端口配置为 -1，XXL-JOB 会自动寻找可用端口并注册，完美解决单机多实例时的端口冲突问题，助力横向扩容！
      port: -1

