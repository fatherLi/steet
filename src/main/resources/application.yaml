spring:
  application:
    name: street

  # ====================================================
  # Database Configuration (MySQL)
  # ====================================================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/street_patrol?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: password # TODO: Change to your actual password

  # ====================================================
  # Redis Configuration (For trajectory cache)
  # ====================================================
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: # TODO: Set password if needed
      database: 0

# ====================================================
# MyBatis-Plus Configuration
# ====================================================
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
